<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔳</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Best Practices -->
    <title>PixelQR — High Tech QR Generator & Interactive Guide</title>
    <meta name="description" content="Generate high-tech, custom QR codes for links, text, Wi-Fi credentials, photos, and files. Learn how QR codes work with PixelQR — your pixel-perfect QR engine." />
    
    <!-- Meta tag for color scheme to aid browser default styling -->
    <meta name="color-scheme" content="light dark" />

    <!-- Inline script to prevent theme flash (FOUC) -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          // Since React code adds it to body, we synchronize both for styling reliability
          document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('dark');
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
